<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, sans-serif;
        width: 260px;
        padding: 12px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      button {
        display: block;
        width: 100%;
        padding: 8px;
        margin-bottom: 6px;
        cursor: pointer;
      }
      .stats {
        font-size: 12px;
        color: #444;
        margin-bottom: 10px;
        line-height: 1.5;
      }
      label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        margin-bottom: 10px;
      }
      .status {
        font-size: 11px;
        color: #666;
        min-height: 14px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Meta Dev Docs Saver</h1>
    <div class="stats" id="stats">Loading…</div>
    <label>
      <input type="checkbox" id="autoSave" />
      Auto-save every page I visit
    </label>
    <button id="saveNow">Save this page</button>
    <button id="exportIndex">Export saved-pages index</button>
    <button id="exportQueue">Export discovered-links queue</button>
    <button id="clearData">Clear stored index / queue</button>
    <div class="status" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
